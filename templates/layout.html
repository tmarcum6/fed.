<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS Reader</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        display: flex;
        height: 100vh;
      }

      #sidebar {
        width: 260px;
        background: #1e1e2e;
        color: #cdd6f4;
        padding: 1rem;
        overflow-y: auto;
        flex-shrink: 0;
      }
      #sidebar h2 {
        font-size: 1rem;
        margin-bottom: 1rem;
        color: #89b4fa;
      }
      #sidebar a {
        display: block;
        padding: 0.4rem 0.5rem;
        color: #cdd6f4;
        text-decoration: none;
        border-radius: 4px;
      }
      #sidebar a:hover {
        background: #313244;
      }
      #sidebar form {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      #sidebar input {
        flex: 1;
        padding: 0.4rem;
        border-radius: 4px;
        border: none;
        font-size: 0.85rem;
      }
      #sidebar button {
        padding: 0.4rem 0.6rem;
        background: #89b4fa;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      #main {
        flex: 1;
        padding: 2rem;
        overflow-y: auto;
        background: #181825;
        color: #cdd6f4;
      }
      #main h1 {
        font-size: 1.4rem;
        margin-bottom: 1.5rem;
        color: #cba6f7;
      }

      .article {
        border-bottom: 1px solid #313244;
        padding: 1rem 0;
      }
      .article h3 a {
        color: #89dceb;
        text-decoration: none;
      }
      .article h3 a:hover {
        text-decoration: underline;
      }
      .article .meta {
        font-size: 0.8rem;
        color: #6c7086;
        margin-top: 0.3rem;
      }
      .article p {
        margin-top: 0.5rem;
        font-size: 0.9rem;
        color: #a6adc8;
      }
      .article.read h3 a {
        color: #6c7086;
      }
      .mark-read {
        font-size: 0.75rem;
        color: #a6e3a1;
        cursor: pointer;
        background: none;
        border: none;
        margin-left: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h2>📡 Feeds</h2>
      <form method="POST" action="/feeds">
        <input type="text" name="url" placeholder="Feed URL..." required />
        <button type="submit">+</button>
      </form>
      <nav>
        <a href="/">All Articles</a>
        <a href="/?unread=true">Unread Only</a>
        <hr style="border-color: #313244; margin: 0.5rem 0" />
        {{ range .Feeds }}
        <a href="/feeds/{{ .ID }}">{{ .Title }}</a>
        {{ end }}
      </nav>
    </div>

    <div id="main">{{ block "content" . }}{{ end }}</div>
  </body>
</html>
