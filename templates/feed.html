{{ define "content" }}
<h1>{{ .Feed.Title }}</h1>

{{ range .Articles }}
<div class="article {{ if .Read }}read{{ end }}">
  <h3>
    <a href="{{ .Link }}" target="_blank">{{ .Title }}</a>
    {{ if not .Read }}
    <form
      method="POST"
      action="/articles/{{ .ID }}/read"
      style="display: inline"
    >
      <button class="mark-read">✓ mark read</button>
    </form>
    {{ end }}
  </h3>
  <div class="meta">{{ .Published.Format "Jan 02, 2006 3:04 PM" }}</div>
  <p>{{ .Description }}</p>
</div>
{{ end }} {{ end }}
