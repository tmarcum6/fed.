{{ define "content" }}
<h1>{{ .Feed.Title }}</h1>

{{ range .Articles }}
<div class="article {{ if .Read }}read{{ end }}">
  <h3>
    <img
      src="{{ favicon .Link }}"
      width="16"
      height="16"
      style="vertical-align: middle; margin-right: 0.4rem; border-radius: 3px"
      onerror="this.style.display='none'"
    />
    <a href="{{ .Link }}" target="_blank">{{ .Title }}</a>
    {{ if not .Read }}
    <form
      method="POST"
      action="/articles/{{ .ID }}/read"
      style="display: inline"
    >
      <button class="mark-read">✓ mark read</button>
    </form>
    {{ end }}
  </h3>
  <div class="meta">{{ .Published.Format "Jan 02, 2006 3:04 PM" }}</div>
  <p>{{ .Description }}</p>
</div>
{{ end }} {{ end }}
